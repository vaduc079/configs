# Statusline configuration
# Source: .claude/statusline.sh reads this file on each invocation

# --- Sections (true/false) ---
SHOW_MODEL=true
SHOW_DIR=true
SHOW_BRANCH=true
SHOW_CONTEXT=true
SHOW_COST=true
SHOW_DURATION=false

# --- Icons ---
ICON_FOLDER=""
ICON_BRANCH=""
ICON_CONTEXT="󰆼"
ICON_TIME=""

# --- Colors (ANSI escape codes) ---
COLOR_MODEL='\033[36m'    # cyan
COLOR_COST='\033[33m'     # yellow
COLOR_BAR_OK='\033[32m'   # green  (context < 70%)
COLOR_BAR_WARN='\033[33m' # yellow (context 70-89%)
COLOR_BAR_CRIT='\033[31m' # red    (context >= 90%)
COLOR_RESET='\033[0m'
