# prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g focus-events on
# set -g focus-follows-mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

###############
# status line #
###############

set -g automatic-rename on
# Auto-rename windows as:
# - /<cwd basename> for shells
# - nvim:<cwd basename> for Neovim
# - <program>:<pane title> for other programs with a non-hostname pane title
# - <program> otherwise
set -g automatic-rename-format '#{?#{m/r:^(bash|fish|ksh|nu|sh|zsh)$,#{pane_current_command}},/#{b:pane_current_path},#{?#{m:nvim,#{pane_current_command}},#{pane_current_command}:#{b:pane_current_path},#{?#{&&:#{pane_title},#{!:#{||:#{m:#{host},#{pane_title}},#{m:#{host_short},#{pane_title}}}}},#{pane_current_command}:#{pane_title},#{pane_current_command}}}}'

set -g status-left ""

set -g window-status-format "[#I#F] #{=50:window_name}"
set -g window-status-current-format " [#I#F] #{=50:window_name} "

set -g @status_right_window_offset "#[fg=#665c54#,bg=default]#[fg=#ebdbb2#,bg=#665c54] #{window_offset_x}#,#{window_offset_y} #[fg=#fabd2f#,bg=#665c54]"
set -g @status_right_zoom '#{?window_zoomed_flag,#[fg=#fabd2f#,bg=default]#[fg=#282828#,bg=#fabd2f]  zoomed #[fg=#458588#,bg=#fabd2f],#[fg=#458588#,bg=default]}'
set -g @status_right_key_table "#[fg=#282828,bg=#458588] #{client_key_table} "
set -g @status_right_session "#[fg=#a89984,bg=#458588]#[fg=#282828,bg=#a89984] #{session_name} "
set -g status-right "#{?window_bigger,#{E:@status_right_window_offset},}#{E:@status_right_zoom}#{E:@status_right_key_table}#{E:@status_right_session}"

set -g status-justify left
set -g status-style "fg=#ebdbb2,bg=default"
set -g status-left-style "fg=#ebdbb2,bg=default"
set -g status-right-style "fg=#a89984,bg=default"
set -g message-style "fg=#ebdbb2,bg=#665c54"
set -g mode-style "fg=#282828,bg=#fabd2f"
set -g window-status-style "fg=#928374,bg=default"
set -g window-status-current-style "fg=#282828,bg=#83a598"
set -g window-status-activity-style "fg=#b8bb26,bg=default"
set -g window-status-bell-style "fg=#fb4934,bg=default"

###################
# end status line #
###################

# smart split pane
bind-key -n C-Enter if-shell -F '#{e|>|:#{e|*|:#{pane_height},#{window_cell_height}},#{e|*|:#{pane_width},#{window_cell_width}}}' \
	'split-window -v -c "#{pane_current_path}"' \
	'split-window -h -c "#{pane_current_path}"'

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -hc "#{pane_current_path}"

bind 0 select-window -t :=10
bind X kill-pane

# pane resize
bind r switch-client -T resize-mode
bind-key -T resize-mode h resize-pane -L 10 \; switch-client -T resize-mode
bind-key -T resize-mode j resize-pane -D 10 \; switch-client -T resize-mode
bind-key -T resize-mode k resize-pane -U 10 \; switch-client -T resize-mode
bind-key -T resize-mode l resize-pane -R 10 \; switch-client -T resize-mode
bind-key -T resize-mode Left resize-pane -L 10 \; switch-client -T resize-mode
bind-key -T resize-mode Down resize-pane -D 10 \; switch-client -T resize-mode
bind-key -T resize-mode Up resize-pane -U 10 \; switch-client -T resize-mode
bind-key -T resize-mode Right resize-pane -R 10 \; switch-client -T resize-mode

# pane/window arrange
bind a switch-client -T arrange-mode
bind-key -T arrange-mode p display-panes \; switch-client -T arrange-mode
bind-key -T arrange-mode j swap-pane -D \; switch-client -T arrange-mode
bind-key -T arrange-mode k swap-pane -U \; switch-client -T arrange-mode
bind-key -T arrange-mode Down swap-pane -D \; switch-client -T arrange-mode
bind-key -T arrange-mode Up swap-pane -U \; switch-client -T arrange-mode
bind-key -T arrange-mode M-1 select-pane -t:.1
bind-key -T arrange-mode M-2 select-pane -t:.2
bind-key -T arrange-mode M-3 select-pane -t:.3
bind-key -T arrange-mode M-4 select-pane -t:.4
bind-key -T arrange-mode M-5 select-pane -t:.5
bind-key -T arrange-mode M-6 select-pane -t:.6
bind-key -T arrange-mode M-7 select-pane -t:.7
bind-key -T arrange-mode M-8 select-pane -t:.8
bind-key -T arrange-mode M-9 select-pane -t:.9
bind-key -T arrange-mode M-0 select-pane -t:.10
bind-key -T arrange-mode 1 swap-window -t :=1 \; select-window -t :=1
bind-key -T arrange-mode 2 swap-window -t :=2 \; select-window -t :=2
bind-key -T arrange-mode 3 swap-window -t :=3 \; select-window -t :=3
bind-key -T arrange-mode 4 swap-window -t :=4 \; select-window -t :=4
bind-key -T arrange-mode 5 swap-window -t :=5 \; select-window -t :=5
bind-key -T arrange-mode 6 swap-window -t :=6 \; select-window -t :=6
bind-key -T arrange-mode 7 swap-window -t :=7 \; select-window -t :=7
bind-key -T arrange-mode 8 swap-window -t :=8 \; select-window -t :=8
bind-key -T arrange-mode 9 swap-window -t :=9 \; select-window -t :=9
bind-key -T arrange-mode 0 swap-window -t :=10 \; select-window -t :=10

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
