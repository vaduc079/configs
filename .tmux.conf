# prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g focus-events on
# set -g focus-follows-mouse on
set -g automatic-rename on
# Auto-rename windows as:
# - /<cwd basename> for shells
# - nvim:<cwd basename> for Neovim
# - <program>:<pane title> for other programs with a non-hostname pane title
# - <program> otherwise
set -g automatic-rename-format '#{?#{m/r:^(bash|fish|ksh|nu|sh|zsh)$,#{pane_current_command}},/#{b:pane_current_path},#{?#{m:nvim,#{pane_current_command}},#{pane_current_command}:#{b:pane_current_path},#{?#{&&:#{pane_title},#{!:#{||:#{m:#{host},#{pane_title}},#{m:#{host_short},#{pane_title}}}}},#{pane_current_command}:#{pane_title},#{pane_current_command}}}}'
set -g status-justify absolute-centre

set -g status-left "[#{session_name}] #{=50:window_name}"
set -g status-left-length 60

set -g window-status-format "[#I#F] #{=30:window_name}"
set -g window-status-current-format "[#I#F] /#{b:pane_current_path}"

set -g status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,} %H:%M %d-%b-%y"

# smart split pane
bind-key -n C-Enter if-shell -F '#{e|>|:#{e|*|:#{pane_height},#{window_cell_height}},#{e|*|:#{pane_width},#{window_cell_width}}}' \
	'split-window -v -c "#{pane_current_path}"' \
	'split-window -h -c "#{pane_current_path}"'

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -hc "#{pane_current_path}"

# pane resize
bind r switch-client -T resize-mode
bind-key -T resize-mode -r h resize-pane -L 10
bind-key -T resize-mode -r j resize-pane -D 10
bind-key -T resize-mode -r k resize-pane -U 10
bind-key -T resize-mode -r l resize-pane -R 10
bind-key -T resize-mode -r Left resize-pane -L 10
bind-key -T resize-mode -r Down resize-pane -D 10
bind-key -T resize-mode -r Up resize-pane -U 10
bind-key -T resize-mode -r Right resize-pane -R 10

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

bind-key -n C-t new-window -c "#{pane_current_path}"

bind X kill-pane
