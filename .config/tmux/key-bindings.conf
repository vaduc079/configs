# smart split pane
bind-key -n C-Enter if-shell -F '#{e|>|:#{e|*|:#{pane_height},#{window_cell_height}},#{e|*|:#{pane_width},#{window_cell_width}}}' \
	'split-window -v -c "#{pane_current_path}"' \
	'split-window -h -c "#{pane_current_path}"'

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -hc "#{pane_current_path}"

# pane resize
bind r switch-client -T resize-mode
bind-key -T resize-mode h resize-pane -L 10 \; switch-client -T resize-mode
bind-key -T resize-mode j resize-pane -D 10 \; switch-client -T resize-mode
bind-key -T resize-mode k resize-pane -U 10 \; switch-client -T resize-mode
bind-key -T resize-mode l resize-pane -R 10 \; switch-client -T resize-mode
bind-key -T resize-mode Left resize-pane -L 10 \; switch-client -T resize-mode
bind-key -T resize-mode Down resize-pane -D 10 \; switch-client -T resize-mode
bind-key -T resize-mode Up resize-pane -U 10 \; switch-client -T resize-mode
bind-key -T resize-mode Right resize-pane -R 10 \; switch-client -T resize-mode

# Unbind suspend-client because I accidentally trigger this often when trying to zoom
unbind C-z
bind C-z resize-pane -Z

# pane/window arrange
bind a switch-client -T arrange-mode
bind-key -T arrange-mode p display-panes \; switch-client -T arrange-mode
bind-key -T arrange-mode j swap-pane -D \; switch-client -T arrange-mode
bind-key -T arrange-mode k swap-pane -U \; switch-client -T arrange-mode
bind-key -T arrange-mode Down swap-pane -D \; switch-client -T arrange-mode
bind-key -T arrange-mode Up swap-pane -U \; switch-client -T arrange-mode
bind-key -T arrange-mode M-1 select-pane -t:.1
bind-key -T arrange-mode M-2 select-pane -t:.2
bind-key -T arrange-mode M-3 select-pane -t:.3
bind-key -T arrange-mode M-4 select-pane -t:.4
bind-key -T arrange-mode M-5 select-pane -t:.5
bind-key -T arrange-mode M-6 select-pane -t:.6
bind-key -T arrange-mode M-7 select-pane -t:.7
bind-key -T arrange-mode M-8 select-pane -t:.8
bind-key -T arrange-mode M-9 select-pane -t:.9
bind-key -T arrange-mode M-0 select-pane -t:.10
bind-key -T arrange-mode 1 swap-window -t :=1 \; select-window -t :=1
bind-key -T arrange-mode 2 swap-window -t :=2 \; select-window -t :=2
bind-key -T arrange-mode 3 swap-window -t :=3 \; select-window -t :=3
bind-key -T arrange-mode 4 swap-window -t :=4 \; select-window -t :=4
bind-key -T arrange-mode 5 swap-window -t :=5 \; select-window -t :=5
bind-key -T arrange-mode 6 swap-window -t :=6 \; select-window -t :=6
bind-key -T arrange-mode 7 swap-window -t :=7 \; select-window -t :=7
bind-key -T arrange-mode 8 swap-window -t :=8 \; select-window -t :=8
bind-key -T arrange-mode 9 swap-window -t :=9 \; select-window -t :=9
bind-key -T arrange-mode 0 swap-window -t :=10 \; select-window -t :=10

bind 0 select-window -t :=10
bind X kill-pane

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf|lumen)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# copy mode mimic vim behavior
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-on \; send -X begin-selection
bind-key -T copy-mode-vi Escape send -X clear-selection \; send -X rectangle-off
bind-key -T copy-mode-vi y send -X copy-pipe

# Popup window

unbind ?
bind ? display-popup \
	-E \
	-w 70% \
	-h 70% \
	"tmux list-keys | fzf"

# tmux sessionizer
bind C-f display-popup \
	-E \
	-w 50% \
	-h 50% \
	"~/configs/.config/zsh/scripts/tmux-sessionizer.sh"

# diff viewer
bind C-d display-popup \
  -E \
  -w 95% \
  -h 95% \
  -d "#{pane_current_path}" \
  "lumen diff"

# lazygit
bind C-g display-popup \
  -E \
  -w 95% \
  -h 95% \
  -d "#{pane_current_path}" \
  "lazygit"
