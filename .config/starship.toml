[custom.node]
symbol = "¯£İ "
command = """
v=$(
  if [ -f .nvmrc ]; then cat .nvmrc
  elif [ -f .node-version ]; then cat .node-version
  elif [ -f mise.toml ]; then grep -m1 '^node' mise.toml | grep -oE '"[^"]+"' | tr -d '"'
  elif [ -f .tool-versions ]; then grep '^node' .tool-versions | awk '{print $2}'
  else node --version 2>/dev/null
  fi
)
case "$v" in v*) echo "$v" ;; *) echo "v$v" ;; esac
"""
format = 'via [$symbol($output )]($style)'
detect_files = [
  'package.json',
  '.node-version',
  '.nvmrc',
  'mise.toml',
  '.tool-versions',
]
style = 'bold green'
disabled = false

