id = "local.agent-topic-sync"
name = "Workspace Topic Sync"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Rename Herdr workspaces from agent topic metadata."
platforms = ["macos", "linux"]

[[actions]]
id = "refresh"
title = "Refresh workspace name"
contexts = ["workspace", "tab", "pane"]
command = ["bun", "sync-names.js"]

[[events]]
on = "pane.agent_detected"
command = ["bun", "sync-names.js"]

[[events]]
on = "pane.agent_status_changed"
command = ["bun", "sync-names.js"]

[[events]]
on = "pane.moved"
command = ["bun", "sync-names.js"]
